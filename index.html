<script>
// ==============================================
// CONFIG & CONSTANTS
// ==============================================
const firebaseConfig = {
  apiKey: "AIzaSyCYdEimQqA64njI3msp3Bm_xfwrqKV4KRA",
  authDomain: "website-music-f0123.firebaseapp.com",
  databaseURL: "https://website-music-f0123-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "website-music-f0123",
  storageBucket: "website-music-f0123.firebasestorage.app",
  messagingSenderId: "615653231847",
  appId: "1:615653231847:web:2e664039d5c5511335a642"
};

const MAX_PHOTO_SIZE = 5 * 1024 * 1024;
const VOICE_ROOM_ID = "global-voice-room";

// ==============================================
// STORAGE
// ==============================================
const Storage = {
  getMyId() { return localStorage.getItem("chat_myId") || ""; },
  saveMyId(id) { localStorage.setItem("chat_myId", id); },
  getContacts() { return JSON.parse(localStorage.getItem("chat_contacts") || "[]"); },
  saveContacts(contacts) { localStorage.setItem("chat_contacts", JSON.stringify(contacts)); },
  addContact(id) {
    let contacts = this.getContacts();
    if (!contacts.includes(id)) {
      contacts.unshift(id);
      this.saveContacts(contacts);
    }
  }
};

// ==============================================
// UI HELPER
// ==============================================
const UI = {
  elements: {
    loginScreen: document.getElementById("login-screen"),
    newChatScreen: document.getElementById("new-chat-screen"),
    changeNameModal: document.getElementById("change-name-modal"),
    viewProfileModal: document.getElementById("view-profile-modal"),
    myNameDisplay: document.getElementById("my-name-display"),
    myIdDisplay: document.getElementById("my-id-display"),
    myAvatar: document.getElementById("my-avatar"),
    myStatus: document.getElementById("my-status"),
    contactList: document.getElementById("contact-list"),
    chatHeader: document.getElementById("chat-header"),
    messages: document.getElementById("messages"),
    textInput: document.getElementById("text-input"),
    fileInput: document.getElementById("file-input"),
    voiceStatus: document.getElementById("voice-status"),
    voiceParticipants: document.getElementById("voice-participants"),
    btnMute: document.getElementById("btn-mute"),
    btnInvite: null,
    btnViewProfile: null,
  },

  showLogin() { this.elements.loginScreen.classList.remove("hidden"); },
  hideLogin() { this.elements.loginScreen.classList.add("hidden"); },
  showNewChat() { this.elements.newChatScreen.classList.remove("hidden"); },
  hideNewChat() { this.elements.newChatScreen.classList.add("hidden"); },
  showChangeName() { this.elements.changeNameModal.classList.remove("hidden"); },
  hideChangeName() { this.elements.changeNameModal.classList.add("hidden"); },
  showViewProfile() { this.elements.viewProfileModal.classList.remove("hidden"); },
  hideViewProfile() { this.elements.viewProfileModal.classList.add("hidden"); },

  setMyName(name) { this.elements.myNameDisplay.textContent = name || Storage.getMyId(); },
  setMyId(id) { this.elements.myIdDisplay.textContent = id; },
  setMyAvatar(url) {
    if (url) {
      this.elements.myAvatar.style.backgroundImage = `url(${url})`;
      this.elements.myAvatar.innerHTML = '';
    } else {
      this.elements.myAvatar.style.backgroundImage = '';
      this.elements.myAvatar.innerHTML = '👤';
    }
  },

  setMyStatus(online) {
    this.elements.myStatus.textContent = online ? "Sedang online" : "Offline";
    this.elements.myStatus.classList.toggle("text-emerald-400", online);
    this.elements.myStatus.classList.toggle("text-zinc-500", !online);
  },

  setHeader(otherId, displayName, avatarUrl = null, online = false) {
    const nameToShow = displayName || otherId;
    const avatarStyle = avatarUrl ? `style="background-image:url(${avatarUrl})"` : '';
    const avatarContent = avatarUrl ? '' : '👤';
    this.elements.chatHeader.innerHTML = `
      <div class="flex items-center gap-4 flex-1">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-3xl avatar" ${avatarStyle}>${avatarContent}</div>
        <div>
          <div class="font-semibold text-lg">${nameToShow}</div>
          <div class="${online ? 'text-emerald-400' : 'text-zinc-500'} text-sm">
            ${online ? 'Sedang online' : 'Offline'}
          </div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button id="btn-view-profile" class="px-4 py-2 bg-teal-600 hover:bg-teal-700 rounded-xl text-sm font-medium">Lihat Profile</button>
        <button id="btn-invite-voice" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-xl text-sm font-medium">Invite ke Voice</button>
        <div id="voice-status" class="text-sm text-zinc-400 hidden">Voice Room: <span id="voice-participants">0</span> orang</div>
      </div>`;

    this.elements.btnInvite = document.getElementById("btn-invite-voice");
    this.elements.btnViewProfile = document.getElementById("btn-view-profile");

    this.elements.btnInvite?.addEventListener("click", () => {
      if (confirm(`Invite ${otherId} ke Voice Room?`)) VoiceRoom.inviteUser(otherId);
    });

    this.elements.btnViewProfile?.addEventListener("click", () => {
      UI.showViewProfile(otherId, displayName, avatarUrl, online);
    });
  },

  showViewProfile(otherId, displayName, avatarUrl, online) {
    document.getElementById("profile-avatar").style.backgroundImage = avatarUrl ? `url(${avatarUrl})` : '';
    document.getElementById("profile-avatar").innerHTML = avatarUrl ? '' : '👤';
    document.getElementById("profile-name").textContent = displayName || otherId;
    document.getElementById("profile-id").textContent = otherId;
    document.getElementById("profile-status-text").textContent = online ? "Sedang online" : "Offline";
    document.getElementById("profile-status-text").classList.toggle("text-emerald-400", online);
    document.getElementById("profile-status-text").classList.toggle("text-zinc-500", !online);
    this.showViewProfile();
  },

  // === PERBAIKAN UTAMA: renderContacts sekarang pakai data-contact-id ===
  renderContacts(contacts, currentRoom, profiles, displayNames, onlineStatus) {
    if (contacts.length === 0) {
      this.elements.contactList.innerHTML = `<div class="p-8 text-center text-zinc-500">Belum ada kontak<br><small>Klik tombol di atas</small></div>`;
      return;
    }
    this.elements.contactList.innerHTML = contacts.map(c => {
      const pic = profiles[c] || null;
      const name = displayNames[c] || c;
      const online = onlineStatus[c] || false;
      const avatarStyle = pic ? `style="background-image:url(${pic})"` : '';
      const avatarContent = pic ? '' : '👤';
      const isActive = currentRoom && currentRoom.includes(c);
      return `
        <div data-contact-id="${c}" onclick="App.openChat('${c}')" class="px-6 py-4 hover:bg-zinc-800 cursor-pointer flex items-center gap-4 border-b border-zinc-800 ${isActive ? 'bg-zinc-800' : ''}">
          <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-3xl avatar" ${avatarStyle}>${avatarContent}</div>
          <div class="flex-1">
            <div class="font-semibold">${name}</div>
            <div class="${online ? 'text-emerald-400' : 'text-zinc-500'} text-xs">
              ${online ? 'online' : 'offline'}
            </div>
          </div>
        </div>
      `;
    }).join("");
  },

  // === BARU: highlight active chat TANPA rebuild seluruh sidebar (ini yang bikin lag hilang) ===
  updateActiveHighlight(activeContactId) {
    const contactItems = this.elements.contactList.querySelectorAll('div[data-contact-id]');
    contactItems.forEach(item => {
      item.classList.toggle('bg-zinc-800', item.dataset.contactId === activeContactId);
    });
  },

  renderMessages(messages, myId) {
    this.elements.messages.innerHTML = messages.map(m => {
      const isMe = m.sender === myId;
      if (m.type === "image") return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}"><img src="${m.content}" class="max-w-[70%] sm:max-w-xs rounded-3xl shadow-2xl"></div>`;
      if (m.type === "audio") return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}"><audio controls src="${m.content}" class="max-w-xs"></audio></div>`;
      return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}"><div class="${isMe ? 'bg-blue-600' : 'bg-zinc-800'} px-5 py-3 rounded-3xl max-w-[70%] sm:max-w-xs break-words">${m.content}</div></div>`;
    }).join("");
    this.elements.messages.scrollTop = this.elements.messages.scrollHeight;
  },

  clearInput() { this.elements.textInput.value = ""; },

  updateVoiceStatus(count) {
    this.elements.voiceParticipants.textContent = count;
    this.elements.voiceStatus.classList.toggle("hidden", count <= 0);
  },

  showMuteButton(show) {
    this.elements.btnMute.classList.toggle("hidden", !show);
  },

  setMuteButton(muted) {
    const btn = this.elements.btnMute;
    if (muted) {
      btn.innerHTML = '<span class="text-2xl">🔇</span> Unmute';
      btn.classList.remove("bg-red-600", "hover:bg-red-700");
      btn.classList.add("bg-zinc-700", "hover:bg-zinc-600");
    } else {
      btn.innerHTML = '<span class="text-2xl">🎤</span> Mute';
      btn.classList.remove("bg-zinc-700", "hover:bg-zinc-600");
      btn.classList.add("bg-red-600", "hover:bg-red-700");
    }
  }
};

// ==============================================
// FIREBASE SERVICE
// ==============================================
const FirebaseService = {
  db: null,
  chatListener: null,

  init() {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    this.db = firebase.database();
  },

  setOnlineStatus(online = true) {
    const uid = App.myId;
    if (!uid) return;

    const statusRef = this.db.ref(`users/${uid}/online`);
    const lastActiveRef = this.db.ref(`users/${uid}/lastActive`);

    statusRef.set(online);
    lastActiveRef.set(firebase.database.ServerValue.TIMESTAMP);

    this.db.ref(".info/connected").on("value", snap => {
      if (snap.val() === false) return;
      statusRef.onDisconnect().set(false);
      lastActiveRef.onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
    });
  },

  listenToRoom(roomId, callback) {
    if (this.chatListener) {
      this.db.ref(`chats/${this.chatListener.roomId}/messages`).off("value");
    }
    const ref = this.db.ref(`chats/${roomId}/messages`);
    const listener = ref.on("value", snap => {
      const data = snap.val() || {};
      const msgs = Object.values(data).sort((a,b) => a.timestamp - b.timestamp);
      callback(msgs);
    });
    this.chatListener = { roomId, listener };
  },

  listenProfilesAndNamesAndStatus(callback) {
    this.db.ref("users").on("value", snap => {
      const data = snap.val() || {};
      const profiles = {};
      const displayNames = {};
      const onlineStatus = {};
      Object.keys(data).forEach(uid => {
        if (data[uid]?.profilePic) profiles[uid] = data[uid].profilePic;
        if (data[uid]?.displayName) displayNames[uid] = data[uid].displayName;
        onlineStatus[uid] = data[uid]?.online === true;
      });
      callback(profiles, displayNames, onlineStatus);
    });
  },

  saveProfilePic(uid, dataUrl) {
    this.db.ref(`users/${uid}/profilePic`).set(dataUrl);
  },

  saveDisplayName(uid, name) {
    this.db.ref(`users/${uid}/displayName`).set(name);
  },

  sendMessage(roomId, sender, content, type = "text") {
    this.db.ref(`chats/${roomId}/messages`).push({ sender, content, type, timestamp: Date.now() });
  }
};

// ==============================================
// VOICE ROOM
// ==============================================
const VoiceRoom = {
  localStream: null,
  peers: {},
  myId: null,
  allowedUsers: [],
  isMuted: false,
  audioTrack: null,

  async loadAllowedUsers() {
    const snap = await FirebaseService.db.ref(`voice-room/invites/${VOICE_ROOM_ID}/allowed`).once("value");
    this.allowedUsers = snap.val() || [];
  },

  isAllowed(uid) {
    return this.allowedUsers.includes(uid);
  },

  async inviteUser(targetId) {
    await this.loadAllowedUsers();
    if (!this.allowedUsers.includes(targetId)) {
      this.allowedUsers.push(targetId);
      await FirebaseService.db.ref(`voice-room/invites/${VOICE_ROOM_ID}/allowed`).set(this.allowedUsers);
      if (App.currentRoom) {
        FirebaseService.sendMessage(App.currentRoom, App.myId, `Aku invite kamu ke Voice Room! Buka Voice Room untuk join.`, "text");
      }
      alert(`Berhasil invite ${targetId} ke Voice Room!`);
    } else {
      alert(`${targetId} sudah bisa join.`);
    }
  },

  async join() {
    if (this.localStream) return;

    await this.loadAllowedUsers();
    if (!this.isAllowed(App.myId)) {
      alert("Kamu belum diinvite ke Voice Room. Minta invite dari teman yang sudah join!");
      return;
    }

    try {
      this.myId = App.myId;
      this.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      this.audioTrack = this.localStream.getAudioTracks()[0];

      FirebaseService.db.ref(`voice-room/participants/${this.myId}`).set({
        joinedAt: Date.now(),
        muted: this.isMuted
      });

      UI.elements.btnMute.onclick = () => this.toggleMute();

      FirebaseService.db.ref(`voice-room/participants`).on("child_added", snap => {
        const uid = snap.key;
        if (uid === this.myId || !this.isAllowed(uid)) return;
        this.createPeerConnection(uid);
      });

      FirebaseService.db.ref(`voice-room/participants`).on("child_removed", snap => {
        const uid = snap.key;
        if (this.peers[uid]) {
          this.peers[uid].close();
          delete this.peers[uid];
        }
        UI.updateVoiceStatus(Object.keys(this.peers).length + (this.localStream ? 1 : 0));
      });

      FirebaseService.db.ref(`voice-room/signaling`).on("child_added", async snap => {
        const data = snap.val();
        if (data.to !== this.myId) return;

        const pc = this.peers[data.from];
        if (!pc) return;

        try {
          if (data.type === "offer") {
            await pc.setRemoteDescription(new RTCSessionDescription(data.payload));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            this.sendSignal(data.from, "answer", pc.localDescription);
          } else if (data.type === "answer") {
            await pc.setRemoteDescription(new RTCSessionDescription(data.payload));
          } else if (data.type === "ice") {
            await pc.addIceCandidate(new RTCIceCandidate(data.payload));
          }
        } catch (err) {
          console.error("Signaling error:", err);
        }
        snap.ref.remove();
      });

      UI.updateVoiceStatus(1);
      UI.showMuteButton(true);
      UI.setMuteButton(this.isMuted);
      document.getElementById("btn-voice-room").innerHTML = '<span class="text-2xl">🚪</span> Keluar Voice Room';
      alert("Kamu masuk Voice Room!");

    } catch (err) {
      alert("Gagal akses mikrofon: " + err.message);
    }
  },

  async leave() {
    if (!this.localStream) return;

    this.localStream.getTracks().forEach(t => t.stop());
    this.localStream = null;
    this.audioTrack = null;

    Object.values(this.peers).forEach(pc => pc.close());
    this.peers = {};

    FirebaseService.db.ref(`voice-room/participants/${this.myId}`).remove();

    UI.updateVoiceStatus(0);
    UI.showMuteButton(false);
    document.getElementById("btn-voice-room").innerHTML = '<span class="text-2xl">🔊</span> Voice Room';
    alert("Kamu keluar dari Voice Room.");
  },

  toggleMute() {
    if (!this.audioTrack) return;

    this.isMuted = !this.isMuted;
    this.audioTrack.enabled = !this.isMuted;

    FirebaseService.db.ref(`voice-room/participants/${this.myId}/muted`).set(this.isMuted);

    UI.setMuteButton(this.isMuted);
  },

  createPeerConnection(targetId) {
    if (this.peers[targetId]) return;

    const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });

    if (this.localStream && !this.isMuted) {
      this.localStream.getTracks().forEach(track => pc.addTrack(track, this.localStream));
    }

    pc.ontrack = e => {
      const audio = new Audio();
      audio.srcObject = e.streams[0];
      audio.autoplay = true;
      audio.play().catch(() => {});
    };

    pc.onicecandidate = e => {
      if (e.candidate) this.sendSignal(targetId, "ice", e.candidate);
    };

    this.peers[targetId] = pc;

    (async () => {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      this.sendSignal(targetId, "offer", pc.localDescription);
    })();

    UI.updateVoiceStatus(Object.keys(this.peers).length + 1);
  },

  sendSignal(to, type, payload) {
    FirebaseService.db.ref(`voice-room/signaling`).push({
      from: this.myId,
      to,
      type,
      payload: payload.toJSON ? payload.toJSON() : payload
    });
  }
};

// ==============================================
// APP
// ==============================================
const App = {
  myId: "",
  contacts: [],
  currentRoom: null,
  profiles: {},
  displayNames: {},
  onlineStatus: {},

  mediaRecorder: null,
  audioChunks: [],

  cleanupOnRoomChange() {
    if (FirebaseService.chatListener) {
      FirebaseService.db.ref(`chats/${FirebaseService.chatListener.roomId}/messages`).off("value");
      FirebaseService.chatListener = null;
    }
    document.getElementById("messages").innerHTML = "";
    document.getElementById("text-input").value = "";
    document.getElementById("btn-invite-voice")?.classList.add("hidden");
    document.getElementById("btn-view-profile")?.classList.add("hidden");
  },

  start() {
    this.myId = Storage.getMyId();
    this.contacts = Storage.getContacts();

    if (this.myId) {
      UI.hideLogin();
      UI.setMyId(this.myId);
      FirebaseService.init();

      FirebaseService.setOnlineStatus(true);

      FirebaseService.listenProfilesAndNamesAndStatus((profiles, displayNames, onlineStatus) => {
        this.profiles = profiles;
        this.displayNames = displayNames;
        this.onlineStatus = onlineStatus;

        UI.setMyAvatar(profiles[this.myId]);
        UI.setMyName(displayNames[this.myId]);
        UI.setMyStatus(onlineStatus[this.myId] !== false);
        UI.renderContacts(this.contacts, this.currentRoom, profiles, displayNames, onlineStatus);
      });
    } else {
      UI.showLogin();
    }

    this.bindEvents();
    this.initVoiceNote();
  },

  bindEvents() {
    document.getElementById("btn-login").onclick = () => this.handleLogin();
    document.getElementById("btn-new-chat").onclick = () => UI.showNewChat();
    document.getElementById("btn-cancel-new").onclick = () => UI.hideNewChat();
    document.getElementById("btn-add-contact").onclick = () => this.addContactAndOpen();
    document.getElementById("btn-send").onclick = () => this.sendText();
    document.getElementById("btn-upload").onclick = () => UI.elements.fileInput.click();
    document.getElementById("file-input").onchange = e => this.sendPhoto(e.target);
    document.getElementById("profile-file").onchange = e => this.uploadProfilePic(e.target);
    UI.elements.textInput.onkeypress = e => { if (e.key === "Enter") this.sendText(); };

    document.getElementById("btn-voice-room").onclick = async () => {
      if (VoiceRoom.localStream) VoiceRoom.leave();
      else await VoiceRoom.join();
    };

    document.getElementById("btn-change-name").onclick = () => UI.showChangeName();
    document.getElementById("btn-cancel-name").onclick = () => UI.hideChangeName();
    document.getElementById("btn-save-name").onclick = () => {
      const newName = document.getElementById("new-name-input").value.trim();
      if (!newName) return alert("Nama tidak boleh kosong!");
      FirebaseService.saveDisplayName(this.myId, newName);
      UI.setMyName(newName);
      UI.hideChangeName();
      document.getElementById("new-name-input").value = "";
      alert("Nama berhasil diubah!");
    };

    document.getElementById("btn-close-profile").onclick = () => UI.hideViewProfile();
  },

  handleLogin() {
    const id = document.getElementById("login-id").value.trim();
    if (!id) return alert("ID tidak boleh kosong!");
    this.myId = id;
    Storage.saveMyId(id);
    UI.hideLogin();
    UI.setMyId(id);
    FirebaseService.init();

    FirebaseService.setOnlineStatus(true);

    FirebaseService.listenProfilesAndNamesAndStatus((profiles, displayNames, onlineStatus) => {
      this.profiles = profiles;
      this.displayNames = displayNames;
      this.onlineStatus = onlineStatus;

      UI.setMyAvatar(profiles[this.myId]);
      UI.setMyName(displayNames[this.myId]);
      UI.setMyStatus(onlineStatus[this.myId] !== false);
      UI.renderContacts(this.contacts, this.currentRoom, profiles, displayNames, onlineStatus);
    });
  },

  addContactAndOpen() {
    const id = document.getElementById("new-contact-id").value.trim();
    if (!id || id === this.myId) return alert("ID tidak valid atau sama dengan ID kamu!");
    Storage.addContact(id);
    this.contacts = Storage.getContacts();
    UI.hideNewChat();
    UI.renderContacts(this.contacts, this.currentRoom, this.profiles, this.displayNames, this.onlineStatus);
    this.openChat(id);
  },

  // === PERBAIKAN UTAMA: openChat sekarang SUPER RINGAN ===
  openChat(otherId) {
    this.cleanupOnRoomChange();

    const roomId = [this.myId, otherId].sort().join("_");
    this.currentRoom = roomId;

    UI.elements.messages.innerHTML = "";
    // TIDAK lagi renderContacts di sini (ini yang bikin lag sebelumnya)

    const avatar = this.profiles[otherId] || null;
    const displayName = this.displayNames[otherId];
    const online = this.onlineStatus[otherId] || false;
    UI.setHeader(otherId, displayName, avatar, online);

    FirebaseService.listenToRoom(roomId, msgs => {
      if (this.currentRoom !== roomId) return;
      UI.renderMessages(msgs, this.myId);
    });

    // Highlight active cuma toggle class (cepet banget!)
    UI.updateActiveHighlight(otherId);
  },

  sendText() {
    const text = UI.elements.textInput.value.trim();
    if (!text || !this.currentRoom) return;
    FirebaseService.sendMessage(this.currentRoom, this.myId, text);
    UI.clearInput();
  },

  sendPhoto(input) {
    const file = input.files[0];
    if (!file || !this.currentRoom) return;
    if (file.size > MAX_PHOTO_SIZE) return alert("Foto max 5MB");
    const reader = new FileReader();
    reader.onload = e => FirebaseService.sendMessage(this.currentRoom, this.myId, e.target.result, "image");
    reader.readAsDataURL(file);
    input.value = "";
  },

  uploadProfilePic(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > MAX_PHOTO_SIZE) return alert("Foto profil max 5MB");
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      FirebaseService.saveProfilePic(this.myId, dataUrl);
      UI.setMyAvatar(dataUrl);
      this.profiles[this.myId] = dataUrl;
      UI.renderContacts(this.contacts, this.currentRoom, this.profiles, this.displayNames, this.onlineStatus);
    };
    reader.readAsDataURL(file);
    input.value = "";
  },

  initVoiceNote() {
    const recordBtn = document.getElementById("btn-record");
    recordBtn.onclick = async () => {
      if (!this.currentRoom) return alert("Buka chat dulu!");
      if (!this.mediaRecorder) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          this.mediaRecorder = new MediaRecorder(stream);
          this.mediaRecorder.ondataavailable = e => this.audioChunks.push(e.data);
          this.mediaRecorder.onstop = () => {
            const blob = new Blob(this.audioChunks, { type: "audio/webm" });
            this.audioChunks = [];
            const reader = new FileReader();
            reader.onload = e => FirebaseService.sendMessage(this.currentRoom, this.myId, e.target.result, "audio");
            reader.readAsDataURL(blob);
          };
        } catch (err) {
          alert("Gagal akses mikrofon: " + err.message);
          return;
        }
      }
      if (this.mediaRecorder.state === "inactive") {
        this.mediaRecorder.start();
        recordBtn.textContent = "⏹";
        recordBtn.classList.add("text-red-500");
      } else {
        this.mediaRecorder.stop();
        recordBtn.textContent = "🎤";
        recordBtn.classList.remove("text-red-500");
      }
    };
  }
};

App.start();

// Cleanup status online saat tab/window ditutup
window.addEventListener("beforeunload", () => {
  FirebaseService.setOnlineStatus(false);
});
</script>
