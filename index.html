<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatID • Chat Pakai ID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-database-compat.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .chat-bg { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://picsum.photos/id/1015/2000/1200'); background-size: cover; }
        .avatar { background-size: cover; background-position: center; }
    </style>
</head>
<body class="bg-zinc-950 text-white h-screen overflow-hidden">

<div class="flex h-screen">
    <div class="w-80 bg-zinc-900 flex flex-col border-r border-zinc-800">
        <div class="p-6 border-b border-zinc-800 relative">
            <div class="flex items-center gap-3">
                <div class="text-4xl">💬</div>
                <h1 class="text-3xl font-bold">ChatID</h1>
            </div>
            <div class="mt-6 flex items-center gap-4">
                <div id="my-avatar" class="w-16 h-16 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-5xl cursor-pointer avatar" onclick="document.getElementById('profile-file').click()">
                    👤
                </div>
                <div>
                    <p class="text-xs text-zinc-400">ID KAMU</p>
                    <div id="my-id-display" class="font-mono text-lg break-all"></div>
                </div>
            </div>
            <input type="file" id="profile-file" accept="image/*" class="hidden" onchange="App.uploadProfilePic(this)" />
        </div>

        <div class="p-4">
            <button id="btn-new-chat" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-3xl font-semibold flex items-center justify-center gap-2">
                <span class="text-2xl">+</span> Chat Baru
            </button>
        </div>

        <div id="contact-list" class="flex-1 overflow-y-auto px-3"></div>

        <div class="p-4 text-xs text-zinc-500 border-t border-zinc-800 text-center">
            Web chat by Leciy • IG:zizizaayyy 🔥
        </div>
    </div>

    <div class="flex-1 flex flex-col">
        <div id="chat-header" class="h-16 bg-zinc-900 border-b border-zinc-800 px-6 flex items-center text-xl font-medium">
            Pilih atau buat chat baru
        </div>
        <div id="messages" class="flex-1 chat-bg overflow-y-auto p-6 space-y-6"></div>
        <div class="bg-zinc-900 border-t border-zinc-800 p-4 flex gap-3 items-center">
            <button id="btn-upload" class="w-12 h-12 flex items-center justify-center text-3xl hover:bg-zinc-800 rounded-2xl">📷</button>
            <input id="text-input" type="text" placeholder="Ketik pesan..." class="flex-1 bg-zinc-800 border border-zinc-700 focus:border-blue-500 rounded-3xl px-6 py-4 outline-none text-lg" />
            <button id="btn-send" class="w-12 h-12 bg-blue-600 hover:bg-blue-700 rounded-2xl flex items-center justify-center text-3xl">➤</button>
        </div>
    </div>
</div>

<!-- Modal Login & New Chat sama seperti sebelumnya -->
<div id="login-screen" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-10 w-full max-w-md mx-4">
        <h2 class="text-4xl font-bold text-center mb-3">Halo 👋</h2>
        <p class="text-zinc-400 text-center mb-8">Masukkan ID kamu (bebas)</p>
        <input id="login-id" type="text" placeholder="contoh: violence123" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-2xl text-center outline-none focus:border-blue-500" />
        <button id="btn-login" class="mt-8 w-full py-5 bg-blue-600 hover:bg-blue-700 rounded-3xl text-2xl font-semibold">MULAI CHAT</button>
    </div>
</div>

<div id="new-chat-screen" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-10 w-full max-w-md mx-4">
        <h2 class="text-2xl font-bold mb-6">Chat Baru</h2>
        <input id="new-contact-id" type="text" placeholder="ID teman kamu" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-xl outline-none focus:border-blue-500" />
        <div class="flex gap-4 mt-8">
            <button id="btn-cancel-new" class="flex-1 py-5 border border-zinc-700 rounded-3xl font-medium">Batal</button>
            <button id="btn-add-contact" class="flex-1 py-5 bg-blue-600 rounded-3xl font-medium">Tambah & Buka</button>
        </div>
    </div>
</div>

<input type="file" id="file-input" accept="image/*" class="hidden" />

<script>
// ==============================================
// CONFIG & CONSTANTS
// ==============================================
const firebaseConfig = {
  apiKey: "AIzaSyCYdEimQqA64njI3msp3Bm_xfwrqKV4KRA",
  authDomain: "website-music-f0123.firebaseapp.com",
  databaseURL: "https://website-music-f0123-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "website-music-f0123",
  storageBucket: "website-music-f0123.firebasestorage.app",
  messagingSenderId: "615653231847",
  appId: "1:615653231847:web:2e664039d5c5511335a642"
};

const MAX_PHOTO_SIZE = 5 * 1024 * 1024; // 5MB

// ==============================================
// STORAGE HELPER
// ==============================================
const Storage = {
  getMyId() { return localStorage.getItem("chat_myId") || ""; },
  saveMyId(id) { localStorage.setItem("chat_myId", id); },
  getContacts() { return JSON.parse(localStorage.getItem("chat_contacts") || "[]"); },
  saveContacts(contacts) { localStorage.setItem("chat_contacts", JSON.stringify(contacts)); },
  addContact(id) {
    let contacts = this.getContacts();
    if (!contacts.includes(id)) {
      contacts.unshift(id);
      this.saveContacts(contacts);
    }
  }
};

// ==============================================
// UI HELPER
// ==============================================
const UI = {
  elements: {
    loginScreen: document.getElementById("login-screen"),
    newChatScreen: document.getElementById("new-chat-screen"),
    myIdDisplay: document.getElementById("my-id-display"),
    myAvatar: document.getElementById("my-avatar"),
    contactList: document.getElementById("contact-list"),
    chatHeader: document.getElementById("chat-header"),
    messages: document.getElementById("messages"),
    textInput: document.getElementById("text-input"),
    fileInput: document.getElementById("file-input"),
  },

  showLogin() { this.elements.loginScreen.classList.remove("hidden"); },
  hideLogin() { this.elements.loginScreen.classList.add("hidden"); },
  showNewChat() { this.elements.newChatScreen.classList.remove("hidden"); },
  hideNewChat() { this.elements.newChatScreen.classList.add("hidden"); },

  setMyId(id) { this.elements.myIdDisplay.textContent = id; },
  setMyAvatar(url) {
    if (url) {
      this.elements.myAvatar.style.backgroundImage = `url(${url})`;
      this.elements.myAvatar.innerHTML = '';
    } else {
      this.elements.myAvatar.style.backgroundImage = '';
      this.elements.myAvatar.innerHTML = '👤';
    }
  },

  setHeader(otherId, avatarUrl = null) {
    const avatarStyle = avatarUrl ? `style="background-image:url(${avatarUrl})"` : '';
    const avatarContent = avatarUrl ? '' : '👤';
    this.elements.chatHeader.innerHTML = `
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-3xl avatar" ${avatarStyle}>${avatarContent}</div>
        <div>
          <div class="font-semibold text-lg">${otherId}</div>
          <div class="text-emerald-400 text-sm">sedang aktif</div>
        </div>
      </div>`;
  },

  renderContacts(contacts, currentRoom, profiles, onClick) {
    const html = contacts.length === 0
      ? `<div class="p-8 text-center text-zinc-500">Belum ada kontak<br><small>Klik tombol di atas</small></div>`
      : contacts.map(c => {
          const pic = profiles[c] || null;
          const avatarStyle = pic ? `style="background-image:url(${pic})"` : '';
          const avatarContent = pic ? '' : '👤';
          return `
            <div onclick="App.openChat('${c}')" 
                 class="px-6 py-4 hover:bg-zinc-800 cursor-pointer flex items-center gap-4 border-b border-zinc-800 ${currentRoom?.includes(c) ? 'bg-zinc-800' : ''}">
              <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-3xl avatar" ${avatarStyle}>${avatarContent}</div>
              <div class="flex-1">
                <div class="font-semibold">${c}</div>
                <div class="text-xs text-emerald-400">online</div>
              </div>
            </div>
          `;
        }).join("");
    this.elements.contactList.innerHTML = html;
  },

  renderMessages(messages, myId) {
    const html = messages.map(m => {
      const isMe = m.sender === myId;
      return m.type === "image"
        ? `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}"><img src="${m.content}" class="max-w-xs rounded-3xl shadow-2xl"></div>`
        : `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
             <div class="${isMe ? 'bg-blue-600' : 'bg-zinc-800'} px-5 py-3 rounded-3xl max-w-xs">${m.content}</div>
           </div>`;
    }).join("");
    this.elements.messages.innerHTML = html;
    this.elements.messages.scrollTop = this.elements.messages.scrollHeight;
  },

  clearInput() { this.elements.textInput.value = ""; }
};

// ==============================================
// FIREBASE SERVICE (FIXED CLEAN)
// ==============================================
const FirebaseService = {
  db: null,
  currentListener: null,

  init() {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    this.db = firebase.database();
  },

  listenToRoom(roomId, callback) {
    // MATIIN SEMUA LISTENER LAMA
    if (this.currentListener) {
      this.currentListener.off();
      this.currentListener = null;
    }

    const ref = this.db.ref(`chats/${roomId}/messages`);
    this.currentListener = ref;

    ref.on("value", snap => {
      const data = snap.val() || {};
      const msgs = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
      callback(msgs);
    });
  },

  listenProfiles(callback) {
    this.db.ref("users").on("value", snap => {
      const data = snap.val() || {};
      const profiles = {};
      Object.keys(data).forEach(uid => {
        if (data[uid].profilePic) profiles[uid] = data[uid].profilePic;
      });
      callback(profiles);
    });
  },

  saveProfilePic(uid, dataUrl) {
    this.db.ref(`users/${uid}/profilePic`).set(dataUrl);
  },

  sendMessage(roomId, sender, content, type = "text") {
    this.db.ref(`chats/${roomId}/messages`).push({
      sender,
      content,
      type,
      timestamp: Date.now()
    });
  },

  sendPhoto(roomId, sender, dataUrl) {
    this.sendMessage(roomId, sender, dataUrl, "image");
  }
};


// ==============================================
// APP (FIXED CLEAN)
// ==============================================
const App = {
  myId: "",
  contacts: [],
  currentRoom: null,
  profiles: {},

  start() {
    this.myId = Storage.getMyId();
    this.contacts = Storage.getContacts();

    if (this.myId) {
      UI.hideLogin();
      UI.setMyId(this.myId);
      FirebaseService.init();

      FirebaseService.listenProfiles(profiles => {
        this.profiles = profiles;
        if (profiles[this.myId]) UI.setMyAvatar(profiles[this.myId]);
        this.renderContacts();
      });
    } else {
      UI.showLogin();
    }

    this.bindEvents();
  },

  bindEvents() {
    document.getElementById("btn-login").onclick = () => this.handleLogin();
    document.getElementById("btn-new-chat").onclick = () => UI.showNewChat();
    document.getElementById("btn-cancel-new").onclick = () => UI.hideNewChat();
    document.getElementById("btn-add-contact").onclick = () => this.addContactAndOpen();
    document.getElementById("btn-send").onclick = () => this.sendText();
    document.getElementById("btn-upload").onclick = () => UI.elements.fileInput.click();
    document.getElementById("file-input").onchange = e => this.sendPhoto(e.target);
    UI.elements.textInput.onkeypress = e => { if (e.key === "Enter") this.sendText(); };
  },

  renderContacts() {
    const html = this.contacts.map(c => {
      const pic = this.profiles[c] || null;
      const avatarStyle = pic ? `style="background-image:url(${pic})"` : "";
      const avatarContent = pic ? "" : "👤";
      const roomId = [this.myId, c].sort().join("_");

      return `
        <div onclick="App.openChat('${c}')"
             class="px-6 py-4 hover:bg-zinc-800 cursor-pointer flex items-center gap-4 border-b border-zinc-800 ${this.currentRoom === roomId ? 'bg-zinc-800' : ''}">
          <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-3xl avatar" ${avatarStyle}>${avatarContent}</div>
          <div class="flex-1">
            <div class="font-semibold">${c}</div>
            <div class="text-xs text-emerald-400">online</div>
          </div>
        </div>
      `;
    }).join("");

    UI.elements.contactList.innerHTML = html;
  },

  handleLogin() {
    const id = document.getElementById("login-id").value.trim();
    if (!id) return alert("ID tidak boleh kosong!");

    this.myId = id;
    Storage.saveMyId(id);
    UI.hideLogin();
    UI.setMyId(id);
    FirebaseService.init();

    FirebaseService.listenProfiles(profiles => {
      this.profiles = profiles;
      if (profiles[this.myId]) UI.setMyAvatar(profiles[this.myId]);
      this.renderContacts();
    });
  },

  addContactAndOpen() {
    const id = document.getElementById("new-contact-id").value.trim();
    if (!id || id === this.myId) return alert("ID tidak valid!");

    Storage.addContact(id);
    this.contacts = Storage.getContacts();
    UI.hideNewChat();
    this.renderContacts();
    this.openChat(id);
  },

  openChat(otherId) {
    const roomId = [this.myId, otherId].sort().join("_");
    this.currentRoom = roomId;

    UI.elements.messages.innerHTML = "";
    this.renderContacts();

    const avatar = this.profiles[otherId] || null;
    UI.setHeader(otherId, avatar);

    FirebaseService.listenToRoom(roomId, msgs => {
      if (this.currentRoom !== roomId) return;
      UI.renderMessages(msgs, this.myId);
    });
  },

  sendText() {
    const text = UI.elements.textInput.value.trim();
    if (!text || !this.currentRoom) return;

    FirebaseService.sendMessage(this.currentRoom, this.myId, text);
    UI.clearInput();
  },

  sendPhoto(input) {
    const file = input.files[0];
    if (!file || !this.currentRoom) return;
    if (file.size > MAX_PHOTO_SIZE) return alert("Foto max 5MB");

    const reader = new FileReader();
    reader.onload = e => {
      FirebaseService.sendPhoto(this.currentRoom, this.myId, e.target.result);
    };

    reader.readAsDataURL(file);
    input.value = "";
  },

  uploadProfilePic(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > MAX_PHOTO_SIZE) return alert("Foto profil max 5MB");

    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      FirebaseService.saveProfilePic(this.myId, dataUrl);
      UI.setMyAvatar(dataUrl);
      this.profiles[this.myId] = dataUrl;
      this.renderContacts();
    };

    reader.readAsDataURL(file);
    input.value = "";
  }
};

// Start app
App.start();
</script>
</body>
</html>
